services:
  - type: web
    name: statbooks-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://statsbooks.netlify.app
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: GOOGLE_BOOKS_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: google/gemma-4-31b-it:free
      - key: OPENROUTER_SEARCH_API_KEY
        sync: false
      - key: OPENROUTER_SEARCH_MODEL
        value: google/gemma-4-31b-it:free
      - key: OPENROUTER_CHAT_API_KEY
        sync: false
      - key: OPENROUTER_CHAT_MODEL
        value: nvidia/nemotron-3-super-120b-a12b:free
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: StatBooks <onboarding@resend.dev>
      - key: ALLOW_EMAIL_DEV_FALLBACK
        value: false
      - key: AUTH_CODE_TEST_INBOX
        sync: false
      # Demo mode: skip the email verification code (no working email provider
      # yet). Set to false once Mailjet/Brevo/SMTP2GO or a domain is configured.
      - key: SKIP_EMAIL_VERIFICATION
        value: "true"
      # Gmail SMTP — used only for local/dev (Render blocks outbound SMTP).
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      # Brevo (HTTP API) — primary email sender in production. Works on Render
      # because it sends over HTTPS, not SMTP. 300 emails/day free.
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER
        value: azaabubakr760@gmail.com

  # Telegram bot — runs in webhook mode so it works on Render's free plan
  # (Telegram traffic wakes the service; no always-on background worker needed).
  - type: web
    name: statbooks-bot
    runtime: node
    rootDir: telegram-bot
    plan: free
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: BOT_MODE
        value: webhook
      - key: BACKEND_URL
        value: https://statbooks-backend.onrender.com
      - key: FRONTEND_URL
        value: https://statsbooks.netlify.app
      - key: OPENROUTER_CHAT_API_KEY
        sync: false
      - key: OPENROUTER_CHAT_MODEL
        value: nvidia/nemotron-3-super-120b-a12b:free
      # Force channel subscription before using the bot. The bot must be an
      # admin of CHANNEL_USERNAME for the check to actually enforce.
      - key: REQUIRE_CHANNEL
        value: "true"
      - key: CHANNEL_USERNAME
        value: "@statsbooks"
