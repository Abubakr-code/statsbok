services:
  - type: web
    name: statbooks-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://statsbooks.netlify.app
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: GOOGLE_BOOKS_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: deepseek/deepseek-chat-v3-0324:free
      - key: OPENROUTER_SEARCH_API_KEY
        sync: false
      - key: OPENROUTER_SEARCH_MODEL
        value: deepseek/deepseek-chat-v3-0324:free
      - key: OPENROUTER_CHAT_API_KEY
        sync: false
      - key: OPENROUTER_CHAT_MODEL
        value: deepseek/deepseek-chat-v3-0324:free
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: StatBooks <onboarding@resend.dev>
      - key: ALLOW_EMAIL_DEV_FALLBACK
        value: false
      - key: AUTH_CODE_TEST_INBOX
        sync: false
      # Demo mode: skip the email verification code (no working email provider
      # yet). Set to false once Mailjet/Brevo/SMTP2GO or a domain is configured.
      - key: SKIP_EMAIL_VERIFICATION
        value: "true"
      # Same bot token as the bot service — lets the backend stream PDFs that
      # users uploaded through Telegram (GET /api/library/:id/pdf).
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      # Gmail SMTP — used only for local/dev (Render blocks outbound SMTP).
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      # Brevo (HTTP API) — primary email sender in production. Works on Render
      # because it sends over HTTPS, not SMTP. 300 emails/day free.
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER
        value: azaabubakr760@gmail.com
      # ── Telegram bot (runs IN-PROCESS in webhook mode) ──────────────────────
      # The bot is hosted inside this same backend service, so one free Render
      # service runs both the API and the bot (OPENROUTER_CHAT_API_KEY above is
      # shared). Keep this service awake with an uptime pinger (UptimeRobot →
      # /api/health) for instant bot responses.
      - key: REQUIRE_CHANNEL
        value: "true"
      - key: CHANNEL_USERNAME
        value: "@statsbooks"
