server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Hide common scanner targets and sensitive files.
    location ~* ^/(?:\.env|\.git|phpmyadmin|phpadminpanel|phpadmin|adminer|wp-admin|wp-login|database|db|backup|dump|config)(?:/|$|\.) {
        return 404;
    }

    location ~* \.php$ {
        return 404;
    }

    # Cache built assets aggressively (they are content-hashed by Vite).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy API calls to the backend running on the same VPS.
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header X-Powered-By;
    }

    # SPA fallback: every unknown route returns index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
