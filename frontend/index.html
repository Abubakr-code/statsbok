<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="StatBooks - iqtibos qaysi kitobdan ekanini bir zumda toping."
    />
    <title>StatBooks — Iqtibos qaysi kitobdan?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="shortcut icon" href="svg/0jdCw.jpg">
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      try {
        var s = JSON.parse(localStorage.getItem('statbooks-theme'));
        if (s && s.state && s.state.theme === 'light') {
          document.documentElement.classList.add('light');
        }
      } catch (e) {}
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
